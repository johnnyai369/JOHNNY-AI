<!DOCTYPE html>
<html lang="en">
<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOHNNY AI</title>

<style>
body{
    margin:0;
    background:#0d1117;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:450px;
    background:#161b22;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 25px lime;
}

h1{
    color:#00ff66;
    text-align:center;
}

#chat{
    height:350px;
    overflow:auto;
    background:#0d1117;
    color:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

input{
    width:75%;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00ff66;
    cursor:pointer;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h1>🤖 JOHNNY AI</h1>

<div id="chat">
<p><b>JOHNNY AI:</b> 👋 नमस्ते! मैं JOHNNY AI हूँ। आपका स्वागत है। आज मैं आपकी किस प्रकार सहायता कर सकता हूँ?</p>
</div>

<input id="msg" placeholder="Type your message...">
<button onclick="send()">Send</button>

</div>

<script src="script.js"></script>
</body>
</html>
